services:
  app:
    build: .
    image: flow-hub
    restart: unless-stopped
    # No host `ports:` mapping — Dokploy's Traefik proxy reaches the
    # container internally on port 3000 via the shared Docker network and
    # routes by domain. Exposing a host port only causes conflicts
    # (e.g. another container already bound 0.0.0.0:3000).
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      # DB + migrations live in the image/volume; override-able via .env
      NUXT_DB_FILE: /data/app.db
      NUXT_MIGRATIONS_DIR: /app/migrations
    volumes:
      # persists the SQLite database (and WAL files) across deploys
      - flow_hub_data:/data
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  flow_hub_data:
