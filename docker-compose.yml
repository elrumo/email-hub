services:
  app:
    # Use a prebuilt image when POSTCARD_IMAGE is set (e.g.
    # ghcr.io/elrumo/email-hub:latest); otherwise build locally.
    build: .
    image: ${POSTCARD_IMAGE:-postcard}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      parse-server:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      # --- Self-hosted defaults: no config needed to boot -------------------
      # Runs the app in self-hosted mode (unlimited usage, no billing UI).
      NUXT_PUBLIC_SELF_HOSTED: "true"
      NUXT_REDIS_URL: redis://redis:6379
      PARSE_SERVER_URL: http://parse-server:1337${PARSE_MOUNT_PATH:-/parse}
      PARSE_LIVEQUERY_URL: ws://parse-server:1337${PARSE_MOUNT_PATH:-/parse}
      PARSE_PUBLIC_SERVER_URL: ${PARSE_PUBLIC_URL:-http://localhost:1337/parse}
      PARSE_SERVER_APPLICATION_ID: ${PARSE_APP_ID:-email-hub}
      # Internal secret shared with parse-server. Only reachable on the private
      # compose network, but override it in .env for an internet-exposed deploy.
      PARSE_SERVER_MASTER_KEY: ${PARSE_MASTER_KEY:-postcard-selfhosted-master-key-change-me}
      # --- AI assistant (optional): set NUXT_AI_API_KEY to enable ----------
      # Any OpenAI-compatible endpoint. Leave NUXT_AI_BASE_URL empty for OpenAI
      # directly, or point it at a local gateway (LiteLLM, Ollama, …).
      NUXT_AI_BASE_URL: ${NUXT_AI_BASE_URL:-}
      NUXT_AI_API_KEY: ${NUXT_AI_API_KEY:-}
      NUXT_AI_MODEL: ${NUXT_AI_MODEL:-gpt-4o-mini}
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
      NUXT_SESSION_COOKIE_SECURE: ${NUXT_SESSION_COOKIE_SECURE:-}
      # --- Outgoing mail (optional): logs to console until SMTP is set -----
      NUXT_MAIL_SMTP_HOST: ${NUXT_MAIL_SMTP_HOST:-}
      NUXT_MAIL_SMTP_PORT: ${NUXT_MAIL_SMTP_PORT:-587}
      NUXT_MAIL_SMTP_SECURE: ${NUXT_MAIL_SMTP_SECURE:-}
      NUXT_MAIL_SMTP_USER: ${NUXT_MAIL_SMTP_USER:-}
      NUXT_MAIL_SMTP_PASS: ${NUXT_MAIL_SMTP_PASS:-}
      NUXT_MAIL_FROM: ${NUXT_MAIL_FROM:-Postcard <no-reply@example.com>}
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - postcard_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  mongo:
    image: mongo:8
    restart: unless-stopped
    # Reconciles the root user with MONGO_PASSWORD on every boot — the stock
    # image only applies MONGO_INITDB_* on an empty volume, so a password
    # change (or a volume created before creds existed) would otherwise leave
    # parse-server failing with "Authentication failed".
    entrypoint: ["/usr/local/bin/mongo-entrypoint.sh"]
    command: ["mongod"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: emailhub
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-68aa30aaa9402a7a4a5dd5c5d5280057}
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - postcard_mongo:/data/db
      - ./mongo/mongo-entrypoint.sh:/usr/local/bin/mongo-entrypoint.sh:ro
    healthcheck:
      # Authenticated ping: a credentials mismatch keeps mongo "unhealthy" so
      # parse-server (depends_on: service_healthy) never crash-loops on it.
      test: ["CMD-SHELL", "mongosh --quiet -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"db.adminCommand('ping')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  parse-server:
    build:
      context: ./parse
      dockerfile: Dockerfile
    image: email-hub-parse
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "1337"
    environment:
      PARSE_SERVER_APPLICATION_ID: ${PARSE_APP_ID:-email-hub}
      # Must match the app's PARSE_SERVER_MASTER_KEY above. Override in .env.
      PARSE_SERVER_MASTER_KEY: ${PARSE_MASTER_KEY:-postcard-selfhosted-master-key-change-me}
      PARSE_SERVER_DATABASE_URI: mongodb://emailhub:${MONGO_PASSWORD:-68aa30aaa9402a7a4a5dd5c5d5280057}@mongo:27017/parse?authSource=admin
      PARSE_SERVER_MOUNT_PATH: ${PARSE_MOUNT_PATH:-/parse}
      PARSE_SERVER_URL: http://parse-server:1337${PARSE_MOUNT_PATH:-/parse}
      PARSE_PUBLIC_SERVER_URL: ${PARSE_PUBLIC_URL:-http://localhost:1337/parse}
      PARSE_SERVER_MASTER_KEY_IPS: ${PARSE_MASTER_KEY_IPS:-0.0.0.0/0}
      PARSE_SERVER_ALLOW_CLIENT_CLASS_CREATION: ${PARSE_ALLOW_CLIENT_CLASS_CREATION:-false}
      # Live Query powers multiplayer document sync (EmailProject updates)
      PARSE_SERVER_START_LIVE_QUERY_SERVER: "true"
      PARSE_SERVER_LIVE_QUERY: '{"classNames":["EmailProject"]}'
      PARSE_SERVER_FILES_ADAPTER: ${PARSE_SERVER_FILES_ADAPTER:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_DIRECT_ACCESS: ${S3_DIRECT_ACCESS:-false}
      S3_BASE_URL: ${S3_BASE_URL:-}
      S3_BUCKET_PREFIX: ${S3_BUCKET_PREFIX:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:1337'+(process.env.PARSE_SERVER_MOUNT_PATH||'/parse')+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postcard_redis:
  postcard_mongo:
